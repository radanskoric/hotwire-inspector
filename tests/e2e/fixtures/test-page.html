<!DOCTYPE html>
<html>

<head>
  <title>Test Page</title>
  <script>
    window.modalController = { name: 'modal-controller' };
    window.Stimulus = {
      getControllerForElementAndIdentifier(element, identifier) {
        if (identifier === 'modal' && element.matches('[data-controller~="modal"]')) {
          return window.modalController;
        }

        return null;
      },
    };
  </script>
</head>

<body>
  <turbo-frame id="main-frame" src="/main" data-controller="sidebar">
    <turbo-frame id="nested-frame">
      <div data-controller="modal dropdown">Modal content</div>
    </turbo-frame>
  </turbo-frame>
  <div data-controller="sidebar">Sidebar</div>
</body>

</html>
