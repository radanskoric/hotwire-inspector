<!doctype html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotwire Inspector</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="app">
    <header class="toolbar">
      <div>
        <h1>Hotwire Inspector</h1>
        <p id="summary">Loading…</p>
      </div>
      <div class="toolbar-actions">
        <label class="theme-control">
          <span>Theme</span>
          <select id="theme-select" class="theme-select" data-controller="theme" data-action="change->theme#setTheme">
            <option value="system">System</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </label>
        <button id="refresh-button" class="btn" type="button">Refresh</button>
      </div>
    </header>
    <main>
      <div id="empty-state" class="empty-state" hidden>No turbo frames or Stimulus controllers found.</div>
      <div id="tree" class="tree" role="tree"></div>
    </main>
  </div>
  <template id="node-template">
    <div class="node" data-controller="node">
      <div class="node-row" role="treeitem" data-controller="panel-node"
        data-action="mouseenter->panel-node#highlight mouseleave->panel-node#clearHighlight dblclick->node#toggleChildren">
        <img src="/icons/reveal-in-elements.svg" class="icon icon-btn" data-action="click->panel-node#inspect" />
        <span class="node-main">
          <span class="node-kind"></span>
          <span class="node-id"></span>
          <span class="node-src" hidden></span>
        </span>
        <span class="badges" hidden></span>
      </div>
      <div class="node-children" role="group" hidden data-node-target="children"></div>
    </div>
  </template>
  <template id="badge-template">
    <span class="badge"></span>
  </template>
  <template id="notice-template">
    <div class="status-notice" data-controller="status" data-action="click->panel-node#storeController" role="status"
      aria-live="polite">
      <span slot="text"></span>
    </div>
  </template>
  <script type="module" src="./main.js"></script>
</body>

</html>
